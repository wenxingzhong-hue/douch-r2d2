<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>团队任务管理系统 V3.2</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --status-ongoing: #e2f0d9;    
            --status-ontime: #cddef6;     
            --status-overdue-no: #fff2cc; 
            --status-overdue-ok: #fce4d6; 
            --status-none: #f2f2f2;       
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background:#f5f7fa; padding:10px; overflow-x: hidden; }

        .wizard-tip { position: fixed; top: 0; left: 0; width: 100%; background: #e6f7ff; border-bottom: 2px solid #91d5ff; padding: 10px; text-align: center; font-size: 14px; font-weight: bold; color: #1890ff; z-index: 2000; display: none; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .wizard-skip-btn { margin-left: 15px; padding: 2px 10px; background: #ff4d4f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; background:#fff; padding:12px 15px; border-radius:8px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,0.06); flex-wrap:wrap; gap:10px; margin-top: 25px;}
        .top-bar h2 { color:#2b7cc7; font-size: 18px; margin: 0;}
        .btn-group { display:flex; gap:8px; align-items: center; }
        .btn-group button { padding:6px 10px; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:bold; background:#2b7cc7; color:white; }

        /* 统计与汇总区 */
        .dashboard { background:#fff; padding:15px; border-radius:8px; margin-bottom:15px; box-shadow:0 1px 6px #00000008; }
        .dashboard h3 { color:#2b7cc7; margin-bottom:10px; font-size: 16px;}
        .group-title { font-size:14px; font-weight:bold; color:#2b7cc7; margin:10px 0 6px; }
        .group-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
        .stat-card { border:1px solid #eee; padding:12px; border-radius:6px; min-width:200px; background:#fafbfc; flex:1;}
        .stat-card h4 { margin-bottom:8px; color:#333; font-size:14px; border-bottom:1px solid #eee; padding-bottom:4px;}
        .stat-row { display:flex; justify-content:space-between; margin:4px 0; font-size:13px; color:#555;}
        
        .summary-box { margin-top:15px; padding-top:12px; border-top:1px dashed #eee; }
        table { width:100%; border-collapse:collapse; background:#fff; font-size:13px; }
        th, td { padding:8px; text-align:left; border-bottom:1px solid #eee; white-space:nowrap; }
        th { background:#f7fafc; font-weight:bold; color:#333; }
        tr.clickable-row { cursor: pointer; transition: background 0.2s; }
        tr.clickable-row:hover { background: #f0f5ff; }
        td.overdue{color:#f56c6c;font-weight:bold;}

        /* 核心工作区 */
        .workspace { display: grid; grid-template-columns: 80% 18%; gap: 2%; margin-bottom: 15px; }
        .window-box { background: white; border-radius: 8px; padding: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); display: flex; flex-direction: column; height: 600px; }
        .window-title { font-size: 14px; font-weight: bold; color: #2b7cc7; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f2f5; padding-bottom: 8px;}
        
        .task-split-layout { display: flex; gap: 10px; flex: 1; overflow: hidden; }
        .task-tree-panel { flex: 3; overflow: auto; padding: 5px; border-right: 1px dashed #eee; }
        .task-week-panel { flex: 1; overflow: auto; padding: 5px; background: #fafbfc; border-radius: 6px; }

        .action-btns button { padding: 4px 8px; margin-left: 4px; font-size: 12px; background: #52c41a; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .action-btns button:disabled { background: #ccc; cursor: not-allowed; }
        .view-btns button { padding: 2px 6px; font-size: 11px; background: #fff; color: #2b7cc7; border: 1px solid #2b7cc7; border-radius: 3px; cursor: pointer;}
        .view-btns button.active { background: #2b7cc7; color: white; }

        /* 树状图结构 (发散与大纲) */
        .tree-node { position: relative; margin-top: 6px; margin-left: 20px; }
        .view-outline .tree-node::before { content: ""; position: absolute; left: -12px; top: 12px; width: 12px; height: 1px; border-top: 1px dashed #ccc; }
        .view-outline .tree-node::after { content: ""; position: absolute; left: -12px; top: -5px; width: 1px; height: calc(100% + 12px); border-left: 1px dashed #ccc; }
        .view-outline .tree-node:last-child::after { height: 17px; }
        
        .view-radial { display: flex; flex-direction: column; gap: 15px; align-items: flex-start; }
        .view-radial > .tree-node { margin-left: 0; margin-top: 0; }
        .view-radial .tree-node { display: flex; flex-direction: row; align-items: center; position: relative; }
        .view-radial .tree-children { display: flex; flex-direction: column; gap: 8px; position: relative; margin-left: 20px; }
        .view-radial .tree-children::before { content: ''; position: absolute; left: -20px; top: 50%; width: 20px; height: 2px; background: #b0c4de; }
        .view-radial .tree-children > .tree-node::before { content: ''; position: absolute; left: -10px; top: 50%; width: 10px; height: 2px; background: #b0c4de; border:none;}
        .view-radial .tree-children > .tree-node::after { content: ''; position: absolute; left: -10px; width: 2px; background: #b0c4de; border:none;}
        .view-radial .tree-children > .tree-node:first-child::after { top: 50%; bottom: -8px; }
        .view-radial .tree-children > .tree-node:last-child::after { top: -8px; bottom: 50%; }
        .view-radial .tree-children > .tree-node:not(:first-child):not(:last-child)::after { top: -8px; bottom: -8px; }
        .view-radial .tree-children > .tree-node:first-child:last-child::after { display: none; }
        .view-radial .tree-node::before { border-top: none; }

        /* 卡片极简设计 */
        .node-main { display: inline-flex; flex-direction: column; padding: 4px 6px; border-radius: 4px; border: 1px solid #d9d9d9; min-width: 170px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); position: relative; cursor: pointer; background: var(--status-none); vertical-align: top; z-index: 2; transition: all 0.2s;}
        .node-main.active-focus { outline: 2px solid #1890ff; box-shadow: 0 0 6px rgba(24,144,255,0.6); }
        .node-main.readonly-card { border-style: dashed; }
        .node-main.drag-over { border: 2px dashed #1890ff !important; background: #e6f7ff !important; transform: scale(1.02); }
        
        .status-ongoing { background-color: var(--status-ongoing) !important; }
        .status-ontime { background-color: var(--status-ontime) !important; }
        .status-overdue-no { background-color: var(--status-overdue-no) !important; }
        .status-overdue-ok { background-color: var(--status-overdue-ok) !important; }

        .node-title-box { display: flex; align-items: center; width: 100%; }
        .node-prefix { font-weight: bold; color: #2b7cc7; font-size: 11px; flex-shrink: 0;}
        .node-content-input { border: none; background: transparent; font-size: 12px; font-weight: bold; flex: 1; outline: none; margin-left: 2px; color: #111;}
        .node-content-input:read-only { color: #444; cursor: default; }
        
        .node-meta { font-size: 10px; color: #555; margin-top: 3px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;}
        .node-meta span { display: inline-block; }
        .node-meta select { font-size: 10px; border: 1px solid #ccc; border-radius: 2px; padding: 0; background: rgba(255,255,255,0.8);}
        
        .node-remark { font-size: 10px; color: #777; margin-top: 4px; border-top: 1px dashed rgba(0,0,0,0.15); padding-top: 2px; cursor: text; min-height: 14px; word-break: break-all;}
        .node-history { font-size: 9px; color: #c09853; margin-top: 2px; line-height: 1.2; border-top: 1px dotted #eaddc5; padding-top: 2px;}

        /* 加减号位置 */
        .toggle-btn { position: absolute; width: 14px; height: 14px; background: #fff; border: 1px solid #aaa; border-radius: 50%; text-align: center; line-height: 12px; font-size: 11px; cursor: pointer; z-index: 10; font-weight: bold; color: #555;}
        .view-outline .toggle-btn { left: -7px; top: -7px; }
        .view-radial .toggle-btn { right: -18px; top: 50%; transform: translateY(-50%); }

        .del-node-btn { position: absolute; right: 2px; top: 2px; font-size: 12px; color: #999; cursor: pointer; display: none; line-height:1;}
        .node-main:hover .del-node-btn { display: block; }
        .del-node-btn:hover { color: #e53e3e; font-weight: bold; }
        
        /* 人员名单区 */
        .user-list { overflow-y: auto; flex: 1; list-style: none; }
        .user-item { padding: 8px; border-bottom: 1px solid #f0f2f5; cursor: pointer; border-radius: 4px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items:center; font-size: 12px;}
        .user-item:hover { background: #e6f7ff; }
        .user-item.highlight-wizard { background: #fffb8f; border: 1px dashed #fadb14; animation: pulse 1.5s infinite; }
        .user-actions span { display: none; }
        .user-item:hover .user-actions span { display: inline; }

        /* 紧凑的时间日历窗口 */
        .time-window { background: white; border-radius: 8px; padding: 10px 15px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 15px; height: 165px;}
        .calendar-wrapper { display: flex; gap: 15px; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 5px; height: 120px;}
        .calendar-month { border: 1px solid #e8e8e8; border-radius: 4px; min-width: 230px; flex: 0 0 auto; background: #fff; padding: 4px; }
        .calendar-month-title { text-align: center; font-weight: bold; font-size: 12px; margin-bottom: 4px; color: #2b7cc7;}
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; text-align: center; font-size: 10px; }
        .calendar-day-head { font-weight: bold; color: #999; padding: 1px; }
        .calendar-day { padding: 4px 2px; border-radius: 3px; cursor: pointer; color: #333; transition: all 0.2s;}
        .calendar-day:hover { background: #e6f7ff; }
        .calendar-day.empty { cursor: default; background: transparent !important; }
        .calendar-day.today { background: #1890ff; color: white; font-weight: bold; }
        .calendar-day.highlight-wizard { background: #fffb8f; border: 1px solid #fadb14; font-weight: bold;}

        /* 模态框 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 700px; max-width: 90%; max-height: 85vh; overflow: auto; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 12px; font-size: 20px; cursor: pointer; color: #999; border:none; background:none; }

        .form-item{margin:12px 0;}
        .form-item label{display:block;margin-bottom:4px;font-weight:bold;color:#333; font-size:13px;}
        .form-item input,.form-item select{width:100%;padding:8px;border:1px solid #ddd;border-radius:4px; font-size:13px;}
        .login-btn{width:100%;padding:10px;background:#2b7cc7;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer; font-weight:bold;}
        .hide{display:none!important;}

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(250, 219, 20, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(250, 219, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 219, 20, 0); }
        }
    </style>
</head>
<body oncontextmenu="handleGlobalRightClick(event)">

<div class="wizard-tip" id="wizardTipBar">
    <span id="wizardTipText">提示信息</span>
    <button class="wizard-skip-btn" onclick="skipWizardStep(event)">右键或点击此处跳过</button>
</div>

<div class="top-bar">
    <h2>团队任务管理系统 V3.2</h2>
    <div class="btn-group">
        <span id="currentUserInfo" style="font-size: 13px; color:#555;">未登录</span>
        <button id="loginTriggerBtn" onclick="openLoginModal()">登录系统</button>
        <button id="editPwdBtn" class="hide" style="background:#16a4fa;" onclick="openEditPwd()">修改密码</button>
        <button id="logoutBtn" class="hide" style="background:#e53e3e;" onclick="logout()">退出登录</button>

    </div>
</div>

<div class="dashboard">
    <h3>📊 任务完成统计</h3>
    <div class="stat-grid" id="statGridBox"></div>
    
    <div class="summary-box">
        <h4 style="color:#2b7cc7; margin-bottom:10px; font-size:15px;">📋 全团队一级任务汇总 <span style="font-size:12px; color:#888; font-weight:normal;">(点击行弹出溯源图)</span></h4>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>最终归属人</th><th>计划日期</th><th>任务内容</th><th>当前状态</th><th>备注</th></tr></thead>

        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>最终归属人</th><th>计划日期</th><th>任务内容</th><th>当前状态</th><th>备注</th></tr></thead>

<div class="workspace hide" id="taskContainer">
    <div class="window-box">
        <div class="window-title" style="flex-wrap: wrap;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
                🌿 任务思维树状视窗
                <select id="viewUserSelect" onchange="switchView()" style="font-size:12px; padding:2px; border-radius:4px; max-width:130px;"></select>
                <span class="view-btns">
                    <button id="btnOutlineView" class="active" onclick="switchTreeViewMode('outline')">大纲</button>

                </span>
            </div>
            <div class="action-btns" id="actionBtns" style="margin-bottom:5px;">
                <button id="btnAddL1" onclick="addTreeRoot('一级时间节点')">+ 增一级</button>
                <button id="btnAddL2" onclick="addTreeRoot('二级时间节点')">+ 独二级</button>
                <button id="btnAddWeek" onclick="addTreeRoot('周任务')" style="background:#1890ff;">+ 独周任务</button>
            </div>

    <div class="window-box">
        <div class="window-title">
            <span>👥 人员名单</span>

<div class="time-window hide" id="timeWindow">

</div>

<div class="modal" id="mindMapModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('mindMapModal')">×</button>
        <h3 id="modalTitle" style="color:#2b7cc7; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:5px;">🔍 任务溯源</h3>

<div class="modal" id="editUserModal">
    <div class="modal-content" style="width: 350px;">
        <button class="close-modal" onclick="closeModal('editUserModal')">×</button>

        <input type="hidden" id="editUserId">

        <div class="form-item"><label>小组</label><input type="text" id="editUserGroup"></div>
        <button class="login-btn" onclick="saveEditUser()">修 改</button>
    </div>
</div>

<div class="modal" id="editPwdModal">
    <div class="modal-content" style="width: 350px;">
        <button class="close-modal" onclick="closeModal('editPwdModal')">×</button>

        <div class="form-item"><label>原密码</label><input type="password" id="oldPwd"></div>
        <div class="form-item"><label>新密码</label><input type="password" id="newPwd"></div>
        <div class="form-item"><label>确认新密码</label><input type="password" id="confirmPwd"></div>
        <button class="login-btn" onclick="saveMyPwd()">确 认</button>
    </div>
</div>

<script>
const API = "/api";
let userList = [];
let currentUser = null;
let viewUid = null; 
let globalTaskData = {}; 
let displayTasks = [];   

const roleLevel = { cto: 4, hw_manager: 3, sw_manager: 3, mech_manager: 3, manager: 3, leader: 2, member: 1 };
const roleText = { cto:"CTO", hw_manager:"硬件经理", sw_manager:"软件经理", mech_manager:"结构经理", manager:"经理", leader:"组长", member:"组员" };
let wizardState = { activeNodeId: null, step: null }; 
let currentViewMode = "outline"; 

/* ================= 工具 ================= */
async function get(url){ try{ const r=await fetch(API+url); return await r.json(); }catch(e){ return null; } }
async function post(url,d){ try{ const r=await fetch(API+url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}); return await r.json(); }catch(e){ return {ok:false}; } }

function getGroupType(groupName) {
    if (!groupName) return 99;
    if (groupName.includes("硬件")) return 1; if (groupName.includes("软件")) return 2; if (groupName.includes("结构")) return 3;
    if (groupName.includes("电气")) return 4; if (groupName.includes("DVT")) return 5; if (groupName.includes("试制")) return 6;
    if (groupName.includes("下线")) return 7; return 99; 
}
function extractGroupNumber(groupName) {
    if (!groupName) return 999; const match = groupName.match(/[一二三四五六七八九十\d]+/); if (!match) return 999;
    const numberMap = { '一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10 };
    return numberMap[match[0]] ?? parseInt(match[0], 10) ?? 999;
}
function compareUserByRoleAndName(a, b) {
    const lvlA = roleLevel[a.role] || 0; const lvlB = roleLevel[b.role] || 0;
    if (lvlB !== lvlA) return lvlB - lvlA; return a.name.localeCompare(b.name, 'zh'); 
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function canViewUserLogic(viewer, target) {
    if(!viewer || !target) return false;
    if(viewer.role === 'cto') return true;
    if(viewer.role === 'hw_manager') return target.group && target.group.includes('硬件');
    if(viewer.role === 'sw_manager') return target.group && target.group.includes('软件');
    if(viewer.role === 'mech_manager') return target.group && target.group.includes('结构');
    if(viewer.role === 'manager') return true;
    if(viewer.role === 'leader') return target.group === viewer.group && (target.role === 'member' || target.role === 'leader');
    if(viewer.role === 'member') return target.id === viewer.id;
    return false;
}
function getSuperiors(uid) {
    let target = userList.find(x => x.id == uid); if(!target) return [];
    return userList.filter(viewer => canViewUserLogic(viewer, target) && viewer.id !== uid && roleLevel[viewer.role] > roleLevel[target.role]).map(x => x.id);
}
function getSubordinates(uid) {
    let viewer = userList.find(x => x.id == uid); if(!viewer) return [];
    return userList.filter(target => canViewUserLogic(viewer, target) && target.id !== uid).map(x => x.id);
}
function isSuperiorOrSelf(viewerId, targetId) { return viewerId === targetId || getSuperiors(targetId).includes(viewerId); }
function canManageUser() { return currentUser && currentUser.role !== "member"; }
function canEditOrDeleteUser(target) { return currentUser && target.id !== 1 && roleLevel[target.role] < roleLevel[currentUser.role]; }

function canDeleteNode(task) {
    if(!currentUser) return false;
    if(task.type === '一级时间节点' || task.type === '二级时间节点') return currentUser.role === 'cto';
    return isSuperiorOrSelf(currentUser.id, task.creatorId);
}
function canEditContent(task) { return canDeleteNode(task); }
function canEditMeta(task) {
    if(!currentUser) return false; if(currentUser.role === 'cto') return true;
    let ownerId = (userList.find(u => u.name === task.owner) || {}).id;
    return isSuperiorOrSelf(currentUser.id, task.creatorId) || (ownerId && isSuperiorOrSelf(currentUser.id, ownerId));
}

/* ================= 核心升级引擎 ================= */
function adaptOldData() {
    let allL1 = [], allL2 = [];
    userList.forEach(u => {
        let d = globalTaskData[u.id]; if (!d) return;
        ['l1', 'l2', 'week'].forEach(k => {
            (d[k] || []).forEach(t => {
                if (!t.id) t.id = "old_" + Math.random().toString(36).substring(2);
                if (!t.type) { if (k === 'l1') t.type = '一级时间节点'; if (k === 'l2') t.type = '二级时间节点'; if (k === 'week') t.type = '周任务'; }
                if (!t.creatorId) t.creatorId = u.id; 
                if (!t.owner) t.owner = u.name; // 找回归属人
                
                if (k === 'l1') allL1.push(t);
                if (k === 'l2') allL2.push(t);
            });
        });
    });

    userList.forEach(u => {
        let d = globalTaskData[u.id]; if (!d) return;
        (d.l2 || []).forEach(t => {
            if (!t.pid && t.parent) { let m = allL1.find(x => x.content === t.parent); if (m) t.pid = m.id; }
        });
        (d.week || []).forEach(t => {
            if (!t.pid && t.parent) {
                let m2 = allL2.find(x => x.content === t.parent);
                if (m2) t.pid = m2.id;
                else {
                    let m1 = allL1.find(x => x.content === t.parent);
                    if (m1) {
                        let dL2 = allL2.find(x => x.pid === m1.id && x.content === "默认分类");
                        if (!dL2) {
                            dL2 = { id: "def_" + Math.random().toString(36).substring(2), pid: m1.id, type: '二级时间节点', content: "默认分类", owner: m1.owner, creatorId: m1.creatorId, date: m1.date, status: "进行中", remark: "自动归类", history: [] };
                            allL2.push(dL2);
                            let ownerU = userList.find(x => x.name === m1.owner) || u;
                            if(!globalTaskData[ownerU.id].l2) globalTaskData[ownerU.id].l2 = [];
                            globalTaskData[ownerU.id].l2.push(dL2);
                        }
                        t.pid = dL2.id;
                    }
                }
            }
        });
    });
}

async function loadSystemData() {
    userList = await get("/users") || []; userList.sort(compareUserByRoleAndName);
    const s = document.getElementById("userSelect"); s.innerHTML = "";
    userList.forEach(u=>{ s.innerHTML += `<option value="${u.id}">${u.name} (${roleText[u.role]||u.role})</option>`; });
    globalTaskData = {};
    const reqs = userList.map(async (u) => { globalTaskData[u.id] = await get(`/task/${u.id}`) || {l1:[], l2:[], week:[]}; });
    await Promise.all(reqs);
    adaptOldData();
}

function switchView() { viewUid = Number(document.getElementById("viewUserSelect").value); flattenAndFilterTasks(); renderTaskTree(); }

function renderUserList() {
    const box = document.getElementById("userListBox"); box.innerHTML = "";
    document.getElementById("addInlineUserBtn").style.display = canManageUser() ? "inline-block" : "none";
    let viewable = [currentUser, ...getSubordinates(currentUser.id).map(id => userList.find(u=>u.id==id))];
    
    // 按统计的排序规则
    viewable.sort((a,b) => {
        let admA = ["cto","hw_manager","sw_manager","mech_manager","manager"].includes(a.role);
        let admB = ["cto","hw_manager","sw_manager","mech_manager","manager"].includes(b.role);
        if (admA && !admB) return -1; if (!admA && admB) return 1; if (admA && admB) return compareUserByRoleAndName(a, b);
        let ta=getGroupType(a.group); let tb=getGroupType(b.group); if(ta!==tb) return ta-tb;
        let na=extractGroupNumber(a.group); let nb=extractGroupNumber(b.group); if(na!==nb) return na-nb;
        return compareUserByRoleAndName(a, b);
    });

    viewable.forEach(u => {
        let btns = canEditOrDeleteUser(u) ? `<span style="font-size:12px; color:#2b7cc7; margin-right:8px;" onclick="openEditUserModal(${u.id}); event.stopPropagation();">编辑</span><span style="font-size:12px; color:#e53e3e;" onclick="deleteUser(${u.id}); event.stopPropagation();">删除</span>` : "";
        box.innerHTML += `<li class="user-item" onclick="handleUserSelect('${u.name}')"><span><b>${u.name}</b> <small style='color:#888;'>${u.group}</small></span><div class="user-actions">${btns}</div></li>`;
    });
}

function flattenAndFilterTasks() {
    if(!currentUser || !viewUid) return;
    let viewer = userList.find(u => u.id == viewUid);
    let scopeIds = [viewer.id, ...getSubordinates(viewer.id)];
    let tempL1=[], tempL2=[], tempWeek=[];
    scopeIds.forEach(id => { let d = globalTaskData[id]; if(d) { if(d.l1)tempL1.push(...d.l1); if(d.l2)tempL2.push(...d.l2); if(d.week)tempWeek.push(...d.week); } });

    let uMap = new Map();
    [...tempL1, ...tempL2, ...tempWeek].forEach(t => { if(!uMap.has(t.id)) uMap.set(t.id, t); });

    displayTasks = Array.from(uMap.values()).filter(t => {
        if (t.type !== '周任务') return true; 
        let isMyWeek = t.owner === viewer.name;
        let ownerUser = userList.find(u=>u.name === t.owner);
        let isCreatedForSub = t.creatorId == viewer.id && ownerUser && scopeIds.includes(ownerUser.id);
        return isMyWeek || isCreatedForSub;
    });
}

/* ================= 任务增删改拖拽 ================= */
async function saveGlobalTask(updatedTask, oldType = null) {
    for (let u of userList) {
        let d = globalTaskData[u.id]; if (!d) continue; let changed = false;
        if (oldType && oldType !== updatedTask.type) {
            let oK = oldType==='一级时间节点'?'l1':(oldType==='二级时间节点'?'l2':'week');
            let nK = updatedTask.type==='一级时间节点'?'l1':(updatedTask.type==='二级时间节点'?'l2':'week');
            let idx = d[oK].findIndex(t=>t.id===updatedTask.id);
            if (idx!==-1) { d[oK].splice(idx,1); d[nK].push({...updatedTask}); changed = true; }
        } else {
            ['l1','l2','week'].forEach(k => { let idx=(d[k]||[]).findIndex(t=>t.id===updatedTask.id); if(idx!==-1){ d[k][idx]={...updatedTask}; changed=true; } });
        }
        if (changed) await post("/task/save", {uid: u.id, data: d});
    }
    flattenAndFilterTasks(); renderDashboard();
}

async function distributeNewTask(newTask) {
    let targetUids = new Set(); targetUids.add(newTask.creatorId);
    let ownerUser = userList.find(u => u.name === newTask.owner); if(ownerUser) targetUids.add(ownerUser.id);
    if(newTask.type !== '周任务') getSuperiors(newTask.creatorId).forEach(id => targetUids.add(id));
    for (let uid of targetUids) {
        let d = globalTaskData[uid] || {l1:[], l2:[], week:[]};
        let k = newTask.type === '一级时间节点'?'l1':(newTask.type==='二级时间节点'?'l2':'week');
        d[k].push(newTask); await post("/task/save", {uid: uid, data: d});
    }
    flattenAndFilterTasks(); renderDashboard();
}

async function executeDelete(id) {
    let idsToDelete = [id];
    function collect(pid) { displayTasks.filter(t=>t.pid===pid).forEach(c=>{ idsToDelete.push(c.id); collect(c.id); }); }
    collect(id);
    for (let u of userList) {
        let d = globalTaskData[u.id]; if (!d) continue; let changed = false;
        ['l1','l2','week'].forEach(k => { let oldL=d[k].length; d[k]=d[k].filter(t=>!idsToDelete.includes(t.id)); if(d[k].length!==oldL) changed=true; });
        if(changed) await post("/task/save", {uid: u.id, data: d});
    }
    if(idsToDelete.includes(wizardState.activeNodeId)) endWizard();
    flattenAndFilterTasks(); renderTaskTree(); renderDashboard();
}

/* 拖拽引擎 */
function dragStart(e, id) { e.dataTransfer.setData("text/plain", id); e.stopPropagation(); }
function dragOver(e, el) { e.preventDefault(); $(el).addClass('drag-over'); }
function dragLeave(e, el) { $(el).removeClass('drag-over'); }
async function dropNode(e, targetId, el) {
    e.preventDefault(); e.stopPropagation(); $(el).removeClass('drag-over');
    let draggedId = e.dataTransfer.getData("text/plain"); if (draggedId === targetId) return;
    let dn = displayTasks.find(t=>t.id===draggedId); let tn = displayTasks.find(t=>t.id===targetId);
    if (!dn || !tn || !canEditContent(dn)) { alert("无权限或无效拖拽"); return; }
    
    let oldType = dn.type; let changed = false;
    if (dn.type === '周任务' && tn.type === '一级时间节点') { dn.type = '二级时间节点'; dn.pid = tn.id; changed = true; } // 升级
    else if (dn.type === '二级时间节点' && tn.type === '一级时间节点') { dn.pid = tn.id; changed = true; } // 换一级
    else if (dn.type === '周任务' && tn.type === '二级时间节点') { dn.pid = tn.id; changed = true; } // 换二级
    else if (dn.pid === tn.pid && dn.type === tn.type) { // 同级排序
        for (let u of userList) {
            let d = globalTaskData[u.id]; if (!d) continue;
            let key = dn.type==='一级时间节点'?'l1':(dn.type==='二级时间节点'?'l2':'week');
            let arr = d[key]; if(!arr) continue;
            let dIdx = arr.findIndex(t=>t.id===dn.id); let tIdx = arr.findIndex(t=>t.id===tn.id);
            if (dIdx!==-1 && tIdx!==-1) {
                let [item] = arr.splice(dIdx,1); tIdx = arr.findIndex(t=>t.id===tn.id);
                arr.splice(tIdx,0,item); await post("/task/save", {uid: u.id, data: d});
            }
        }
        flattenAndFilterTasks(); renderTaskTree(); return;
    } else { alert("非法拖拽"); return; }
    
    if (changed) { await saveGlobalTask(dn, oldType); renderTaskTree(); }
}

/* ================= UI 渲染 ================= */
function switchTreeViewMode(mode) {
    currentViewMode = mode; $(".view-btns button").removeClass("active");
    if(mode === 'outline') { $("#btnOutlineView").addClass("active"); $("#taskTreeBox, #independentWeekBox").removeClass("view-radial").addClass("view-outline"); } 
    else { $("#btnRadialView").addClass("active"); $("#taskTreeBox, #independentWeekBox").removeClass("view-outline").addClass("view-radial"); }
}
function getPrefix(type) { if(type==="一级时间节点") return "【一】"; if(type==="二级时间节点") return "【二】"; if(type==="周任务") return "【周】"; return ""; }

function renderTaskTree() {
    const mainBox = document.getElementById("taskTreeBox"); const weekBox = document.getElementById("independentWeekBox");
    mainBox.innerHTML = ""; weekBox.innerHTML = '<h4 style="font-size:13px; color:#666; margin-bottom:10px; text-align:center; border-bottom:1px dashed #ccc; padding-bottom:5px;">独立周任务专区</h4>';
    
    displayTasks.filter(t => !t.pid).forEach(root => {
        if (root.type === "周任务") weekBox.appendChild(buildTreeNodeDOM(root));
        else mainBox.appendChild(buildTreeNodeDOM(root));
    });
}

function buildTreeNodeDOM(node) {
    let div = document.createElement("div"); div.className = "tree-node"; div.id = `node_wrap_${node.id}`;
    let children = displayTasks.filter(t => t.pid === node.id);
    let statusClass = "status-none";
    if (node.status==="进行中") statusClass="status-ongoing"; else if (node.status==="按时完成") statusClass="status-ontime";
    else if (node.status==="延期未完成") statusClass="status-overdue-no"; else if (node.status==="延期完成") statusClass="status-overdue-ok";

    let focusClass = (wizardState.activeNodeId === node.id) ? "active-focus" : "";
    let isC = canEditContent(node); let isM = canEditMeta(node);
    
    let histHtml = (node.history && node.history.length > 0) ? `<div class="node-history">${node.history.join('<br>')}</div>` : "";

    let html = `
        <div class="node-main ${statusClass} ${focusClass} ${(!isC&&!isM)?'readonly-card':''}" onclick="startTaskWizard('${node.id}', event)" draggable="${isC?'true':'false'}" ondragstart="dragStart(event, '${node.id}')" ondragover="dragOver(event, this)" ondragleave="dragLeave(event, this)" ondrop="dropNode(event, '${node.id}', this)">
            ${children.length>0 ? `<div class="toggle-btn" onclick="toggleNodeCollapse('${node.id}', event)">${node.isCollapsed ? '+' : '-'}</div>` : ''}
            ${canDeleteNode(node) ? `<span class="del-node-btn" onclick="deleteNode('${node.id}', event)" title="删除">×</span>` : ''}
            <div class="node-title-box"><span class="node-prefix">${getPrefix(node.type)}</span><input class="node-content-input" value="${node.content}" onchange="updateNodeContent('${node.id}', this.value)" ${!isC?'readonly':''} /></div>
            <div class="node-meta">
                <span>👤 <b>${node.owner || '-'}</b></span>
                <span>📅 <b>${node.date || '-'}</b></span>
                <span>📈 <select onclick="event.stopPropagation()" onchange="updateNodeStatus('${node.id}', this.value)" ${!isM?'disabled':''}>
                    <option value="进行中" ${node.status==='进行中'?'selected':''}>进行中</option><option value="按时完成" ${node.status==='按时完成'?'selected':''}>按时完成</option><option value="延期未完成" ${node.status==='延期未完成'?'selected':''}>延期未完成</option><option value="延期完成" ${node.status==='延期完成'?'selected':''}>延期完成</option>
                </select></span>
            </div>
            <div class="node-remark" ${isM?'contenteditable="true"':''} onclick="event.stopPropagation()" onblur="updateNodeRemark('${node.id}', this.innerText)">${node.remark || (isM?'(添加备注)':'')}</div>
            ${histHtml}
        </div>`;
    div.innerHTML = html;

    if (!node.isCollapsed && children.length>0) {
        let childContainer = document.createElement("div"); childContainer.className = "tree-children";
        children.forEach(c => childContainer.appendChild(buildTreeNodeDOM(c))); div.appendChild(childContainer);
    }
    return div;
}

/* ================= 键盘与向导 ================= */
function autoFocusInput(id) { setTimeout(() => { let i = $(`#node_wrap_${id}`).find('.node-content-input')[0]; if(i) { i.focus(); i.select(); } }, 50); }

$(document).on("keydown", function(e) {
    if (!wizardState.activeNodeId) return;
    if ($(e.target).hasClass("node-content-input")) {
        let curr = displayTasks.find(t => t.id === wizardState.activeNodeId);
        if (!curr || (curr.type !== '周任务' && currentUser.role === 'member')) return;

        if (e.key === "Enter") {
            e.preventDefault(); let nId = String(Date.now());
            let nSib = { id: nId, pid: curr.pid, type: curr.type, content: "新任务", owner: "", creatorId: currentUser.id, date: "", status: "进行中", remark: "", actualDate: "", isCollapsed: false, history: [] };
            distributeNewTask(nSib).then(()=>{ startTaskWizard(nId, {stopPropagation:()=>{}}); autoFocusInput(nId); });
        } 
        else if (e.key === "Tab") {
            e.preventDefault();
            if (curr.type === "周任务") { alert("⚠️ 周任务为底层节点，无法继续向下拆分。"); return; }
            let nId = String(Date.now()); let subType = curr.type === "一级时间节点" ? "二级时间节点" : "周任务";
            let nChild = { id: nId, pid: curr.id, type: subType, content: "新任务", owner: "", creatorId: currentUser.id, date: "", status: "进行中", remark: "", actualDate: "", isCollapsed: false, history:[] };
            curr.isCollapsed = false; saveGlobalTask(curr);
            distributeNewTask(nChild).then(()=>{ startTaskWizard(nId, {stopPropagation:()=>{}}); autoFocusInput(nId); });
        }
    }
});

function startTaskWizard(nodeId, event) {
    event.stopPropagation(); let node = displayTasks.find(t => t.id === nodeId); if(!node || !canEditMeta(node)) return;
    wizardState.activeNodeId = nodeId; wizardState.step = 'OWNER';
    $(".node-main").removeClass("active-focus"); $(`#node_wrap_${nodeId} > .node-main`).addClass("active-focus");
    $("#wizardTipBar").fadeIn(200); $("#wizardTipText").html(`👉 <b>一: 选人</b> 请在右侧名单左键指派归属人。`); $(".user-item").addClass("highlight-wizard");
}
function handleUserSelect(userName) {
    if (wizardState.step !== 'OWNER') return;
    let node = displayTasks.find(t => t.id === wizardState.activeNodeId); if (node) { node.owner = userName; saveGlobalTask(node); }
    wizardState.step = 'DATE'; $(".user-item").removeClass("highlight-wizard");
    $("#wizardTipText").html(`👉 <b>二: 定时</b> 请在下方选择日期。`); $(".calendar-day:not(.empty)").addClass("highlight-wizard");
    renderTaskTree(); document.getElementById('timeWindow').scrollIntoView({behavior: 'smooth', block: 'center'});
}
async function handleCalendarDayClick(dateStr) {
    if (wizardState.step !== 'DATE') return;
    let node = displayTasks.find(t => t.id === wizardState.activeNodeId); if (!node) return;
    if (node.type !== '周任务' && node.date && node.date !== dateStr) {
        let reason = prompt("修改一、二级任务的时间需输入原因："); if (!reason) return;
        node.history = node.history || []; node.history.push(`⏰ ${node.date} -> ${dateStr} | 原因:${reason}`);
    }
    node.date = dateStr; await saveGlobalTask(node); endWizard();
}
function skipWizardStep(event) {
    if(event) event.stopPropagation();
    if (wizardState.step === 'OWNER') {
        wizardState.step = 'DATE'; $(".user-item").removeClass("highlight-wizard");
        $("#wizardTipText").html(`👉 <b>二: 定时</b> 请在下方选取日期。`); $(".calendar-day:not(.empty)").addClass("highlight-wizard");
        document.getElementById('timeWindow').scrollIntoView({behavior: 'smooth', block: 'center'});
    } else if (wizardState.step === 'DATE') endWizard();
}
function handleGlobalRightClick(e) { if (wizardState.step) { e.preventDefault(); skipWizardStep(); } }
function endWizard() { wizardState.activeNodeId = null; wizardState.step = null; $("#wizardTipBar").fadeOut(200); $(".user-item, .calendar-day").removeClass("highlight-wizard"); $(".node-main").removeClass("active-focus"); renderTaskTree(); }

function initCalendar() {
    const box = document.getElementById("calendarWrapper"); box.innerHTML = "";
    let baseDate = new Date(); baseDate.setDate(1); let monthCount = window.innerWidth < 850 ? 2 : 5;
    for (let m = 0; m < monthCount; m++) {
        let workDate = new Date(baseDate.getFullYear(), baseDate.getMonth() + m, 1);
        let year = workDate.getFullYear(); let month = workDate.getMonth();
        let monthDiv = document.createElement("div"); monthDiv.className = "calendar-month";
        monthDiv.innerHTML = `<div class="calendar-month-title">${year}年${month + 1}月</div>`;
        let grid = document.createElement("div"); grid.className = "calendar-grid";
        ["日", "一", "二", "三", "四", "五", "六"].forEach(h => grid.innerHTML += `<div class="calendar-day-head">${h}</div>`);
        let firstDayIndex = new Date(year, month, 1).getDay(); let totalDays = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDayIndex; i++) grid.innerHTML += `<div class="calendar-day empty"></div>`; 
        for (let d = 1; d <= totalDays; d++) {
            let dayStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let t = new Date(); let isToday = (d===t.getDate() && month===t.getMonth() && year===t.getFullYear()) ? "today" : ""; 
            grid.innerHTML += `<div class="calendar-day ${isToday}" data-date="${dayStr}" onclick="handleCalendarDayClick('${dayStr}')">${d}</div>`;
        }
        monthDiv.appendChild(grid); box.appendChild(monthDiv);
    }
}

function updateNodeContent(id, val) { let node = displayTasks.find(t => t.id === id); if (node) { node.content = val; saveGlobalTask(node); } }
function updateNodeRemark(id, val) { let node = displayTasks.find(t => t.id === id); if (node) { node.remark = val; saveGlobalTask(node); } }
function updateNodeStatus(id, val) {
    let node = displayTasks.find(t => t.id === id);
    if (node) { node.status = val; if(val.includes("完成") && !node.actualDate) { let t=new Date(); node.actualDate=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; } else if(!val.includes("完成")) node.actualDate = ""; saveGlobalTask(node); }
}
function toggleNodeCollapse(id, e) { e.stopPropagation(); let node = displayTasks.find(t => t.id === id); if (node) { node.isCollapsed = !node.isCollapsed; renderTaskTree(); } }
async function addTreeRoot(type) {
    if (type !== '周任务' && currentUser.role === 'member') { alert("组员只能添加周任务"); return; }
    let newId = String(Date.now());
    let newTask = { id: newId, pid: null, type: type, content: "新任务", owner: "", creatorId: currentUser.id, date: "", status: "进行中", remark: "", actualDate: "", isCollapsed: false, history: [] };
    await distributeNewTask(newTask); startTaskWizard(newId, {stopPropagation:()=>{}}); autoFocusInput(newId);
}

/* ================= 仪表盘统计 ================= */
function renderDashboard() {
    const grid = document.getElementById("statGridBox"); grid.innerHTML = "";
    let allPool = new Map();
    userList.forEach(u => { let d = globalTaskData[u.id]; if(d) { (d.l1||[]).forEach(t=>allPool.set(t.id,t)); (d.l2||[]).forEach(t=>allPool.set(t.id,t)); (d.week||[]).forEach(t=>allPool.set(t.id,t)); } });
    let allTasksArr = Array.from(allPool.values());

    const adminUsers = userList.filter(u=>["cto","hw_manager","sw_manager","mech_manager","manager"].includes(u.role));
    if(adminUsers.length){
        adminUsers.sort(compareUserByRoleAndName); 
        let groupDiv = document.createElement("div"); groupDiv.style.width="100%";
        groupDiv.innerHTML = `<div class="group-title">管理层（CTO/各模块经理）</div>`;
        let rowDiv = document.createElement("div"); rowDiv.className="group-row";
        adminUsers.forEach(u=> rowDiv.appendChild(createStatCard(u, allTasksArr)));
        groupDiv.appendChild(rowDiv); grid.appendChild(groupDiv);
    }

    const groupMap = {};
    userList.forEach(u=>{ if(!["cto","hw_manager","sw_manager","mech_manager","manager"].includes(u.role)) { groupMap[u.group] = groupMap[u.group]||[]; groupMap[u.group].push(u); } });
    const sortedGroups = Object.keys(groupMap).sort((a,b)=>{ let ta=getGroupType(a); let tb=getGroupType(b); return ta!==tb ? ta-tb : extractGroupNumber(a)-extractGroupNumber(b); });
    
    sortedGroups.forEach(g=>{
        let groupDiv = document.createElement("div"); groupDiv.style.width="100%";
        groupDiv.innerHTML = `<div class="group-title">小组：${g}</div>`;
        let rowDiv = document.createElement("div"); rowDiv.className="group-row";
        groupMap[g].sort(compareUserByRoleAndName);
        groupMap[g].forEach(u=> rowDiv.appendChild(createStatCard(u, allTasksArr)));
        groupDiv.appendChild(rowDiv); grid.appendChild(groupDiv);
    });

    const sumL1 = document.getElementById("l1SummaryTable"); sumL1.innerHTML = "";
    const sumL2 = document.getElementById("independentL2Table"); sumL2.innerHTML = "";
    
    let l1s = allTasksArr.filter(t=>t.type==='一级时间节点').sort((a,b)=>new Date(a.date||'2099') - new Date(b.date||'2099'));
    let l2sIndep = allTasksArr.filter(t=>t.type==='二级时间节点' && !t.pid).sort((a,b)=>new Date(a.date||'2099') - new Date(b.date||'2099'));
    
    l1s.forEach(t => {
        let dc = (t.status==='延期未完成'||t.status==='延期完成')?"overdue":"";
        sumL1.innerHTML += `<tr class="clickable-row" onclick="openMindMapModal('${t.id}')"><td>${t.owner||'-'}</td><td class="${dc}">${t.date||'-'}</td><td>${t.content}</td><td>${t.status}</td><td>${t.remark||''}</td></tr>`;
    });
    l2sIndep.forEach(t => {
        let dc = (t.status==='延期未完成'||t.status==='延期完成')?"overdue":"";
        sumL2.innerHTML += `<tr class="clickable-row" onclick="openMindMapModal('${t.id}')"><td>${t.owner||'-'}</td><td class="${dc}">${t.date||'-'}</td><td>${t.content}</td><td>${t.status}</td><td>${t.remark||''}</td></tr>`;
    });
}

function createStatCard(user, allTasks) {
    let uTasks = allTasks.filter(t => t.owner === user.name);
    let t1 = uTasks.filter(t=>t.type==="一级时间节点"); let t2 = uTasks.filter(t=>t.type==="二级时间节点"); let t3 = uTasks.filter(t=>t.type==="周任务");
    function p(list){ if(!list||list.length===0)return "100%"; const delayed = list.filter(x=>x.status==="延期未完成" || x.status==="延期完成").length; return Math.round((1 - delayed/list.length)*100)+"%"; }
    const d=document.createElement("div");d.className="stat-card";
    const rName = roleText[user.role] || user.role;
    d.innerHTML=`<h4><b>${user.name}</b> (${rName})</h4><div class="stat-row">一级：${p(t1)}</div><div class="stat-row">二级：${p(t2)}</div><div class="stat-row">周任务：${p(t3)}</div>`;
    return d;
}

function openMindMapModal(rootId) {
    $("#mindMapModal").css("display", "flex");
    let allPool = new Map();
    userList.forEach(u => { let d=globalTaskData[u.id]; if(d) { (d.l1||[]).forEach(t=>allPool.set(t.id,t)); (d.l2||[]).forEach(t=>allPool.set(t.id,t)); (d.week||[]).forEach(t=>allPool.set(t.id,t)); }});
    let allArr = Array.from(allPool.values());
    let rootNode = allArr.find(t => t.id === rootId); if (!rootNode) return;
    
    document.getElementById("modalTitle").innerText = `🔍 任务溯源 — [${rootNode.content}]`;
    const box = document.getElementById("modalTreeContent"); box.innerHTML = "";
    
    function renderSub(node) {
        let d = document.createElement("div"); d.className = "tree-node";
        let statusClass = "status-none";
        if(node.status==="进行中") statusClass="status-ongoing"; else if(node.status==="按时完成") statusClass="status-ontime"; else if(node.status==="延期未完成") statusClass="status-overdue-no"; else if(node.status==="延期完成") statusClass="status-overdue-ok";
        d.innerHTML = `
            <div class="node-main ${statusClass}" style="min-width:180px;">
                <div class="node-title-box"><span class="node-prefix">${getPrefix(node.type)}</span><span style="font-size:12px; font-weight:bold; margin-left:4px;">${node.content}</span></div>
                <div class="node-meta">归属:${node.owner||'-'} | 计划:${node.date||'-'} | 状态:${node.status}</div>
            </div>`;
        let children = allArr.filter(t => t.pid === node.id);
        if(children.length > 0) {
            let childContainer = document.createElement("div"); childContainer.className = "tree-children";
            children.forEach(c => childContainer.appendChild(renderSub(c))); d.appendChild(childContainer);
        }
        return d;
    }
    box.appendChild(renderSub(rootNode));
}

/* ================= 嵌入式用户管理 ================= */
function openAddUserModal() {
    document.getElementById("newUserName").value="";
    let s=document.getElementById("newUserRole"); s.innerHTML="";
    if(currentUser.role==="cto") s.innerHTML+='<option value="hw_manager">硬件经理</option><option value="sw_manager">软件经理</option><option value="mech_manager">结构经理</option><option value="manager">其他经理</option>';
    if(currentUser.role==="cto"||isManager()) s.innerHTML+='<option value="leader">组长</option>';
    s.innerHTML+='<option value="member">组员</option>';
    document.getElementById("addUserModal").style.display="flex";
}
async function saveNewUser() {
    const n=document.getElementById("newUserName").value.trim(); const r=document.getElementById("newUserRole").value; const g=document.getElementById("newUserGroup").value.trim();
    if(!n) return;
    const res=await post("/user/add",{name:n,role:r,group:g,pwd:btoa("8888")});
    if(res.ok){ closeModal("addUserModal"); await loadSystemData(); refreshUI(); } else alert(res.msg);
}
function openEditUserModal(id) {
    const u=userList.find(x=>x.id==id); if(!u) return;
    document.getElementById("editUserId").value=u.id; document.getElementById("editUserName").value=u.name; document.getElementById("editUserGroup").value=u.group;
    let s=document.getElementById("editUserRole"); s.innerHTML=""; let allow=[];
    if(currentUser.role==="cto")allow.push("hw_manager","sw_manager","mech_manager","manager","leader","member");
    if(isManager())allow.push("leader","member"); if(currentUser.role==="leader")allow.push("member");
    allow.forEach(r=>{s.innerHTML+=`<option value="${r}" ${r===u.role?"selected":""}>${roleText[r]||r}</option>`;});
    document.getElementById("editUserModal").style.display="flex";
}
async function saveEditUser() {
    const id=document.getElementById("editUserId").value; const n=document.getElementById("editUserName").value.trim(); const r=document.getElementById("editUserRole").value; const g=document.getElementById("editUserGroup").value.trim();
    if(!n) return; const res=await post("/user/edit",{id,name:n,role:r,group:g});
    if(res.ok){ closeModal("editUserModal"); await loadSystemData(); refreshUI(); } else alert(res.msg);
}
async function deleteUser(id) { if(confirm("确定删除？")) { const res=await post("/user/delete",{id}); if(res.ok){ await loadSystemData(); refreshUI(); } } }

function openEditPwd() { document.getElementById("oldPwd").value=""; document.getElementById("newPwd").value=""; document.getElementById("confirmPwd").value=""; document.getElementById("editPwdModal").style.display="flex"; }
async function saveMyPwd() {
    const o=document.getElementById("oldPwd").value; const n=document.getElementById("newPwd").value; const c=document.getElementById("confirmPwd").value;
    if(!o||!n||!c) return; if(n!==c) return; if(currentUser.pwd!==btoa(o)) return;
    await post("/user/update-pwd",{id:currentUser.id,pwd:btoa(n)}); closeModal("editPwdModal"); alert("成功，请重登录"); logout();
}

window.onload = async function() { await loadSystemData(); initCalendar(); refreshUI(); };
