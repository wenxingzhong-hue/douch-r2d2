<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>团队任务管理系统</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei", sans-serif;}
        body{background:#f5f7fa;padding:20px;}

        .easy-tooltip{
            position: absolute;
            background: #222;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size:14px;
            max-width:500px;
            z-index:9999;
            display:none;
            white-space:pre-wrap;
            box-shadow:0 2px 6px #00000033;
            word-break: break-all;
        }

        .form-item{margin:16px 0;}
        .form-item label{display:block;margin-bottom:6px;font-weight:bold;color:#333;}
        .form-item input,.form-item select,.form-item textarea{
            width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:15px;background:#fff !important;color:#333;
        }
        .login-btn{width:100%;padding:14px;background:#2b7cc7;color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px;}

        .top-bar{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:16px 20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 10px #00000010;flex-wrap:wrap;gap:15px;}
        .top-bar h2{color:#2b7cc7; font-size: 22px;}
        .btn-group{display:flex;align-items:center;gap:10px; flex-wrap: wrap;}
        .btn-group button{padding:10px 16px;border:none;border-radius:6px;cursor:pointer;font-size:14px; font-weight:bold;}
        .login-trigger-btn{background:#2b7cc7;color:white;}
        .add-user-btn{background:#2b7cc7;color:white;}
        .edit-pwd-btn{background:#16a4fa;color:white;}
        .reset-pwd-btn,.logout-btn{background:#e53e3e;color:white;}
        .export-btn{background:#67c23a;color:white;}

        .filter-wrap{background:#fff;padding:15px;border-radius:10px;margin:20px 0;display:flex;gap:15px;align-items:center;flex-wrap:wrap;}
        .filter-wrap select{padding:8px;border-radius:6px;border:1px solid #ddd; font-size: 14px;}

        .dashboard{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px; box-shadow:0 2px 8px #00000008;}
        .dashboard h3{color:#2b7cc7;margin-bottom:16px;}
        .group-title{font-size:16px;font-weight:bold;color:#2b7cc7;margin:16px 0 10px;}
        .group-row{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:15px;}
        .stat-card{border:1px solid #eee;padding:16px;border-radius:8px;min-width:240px;background:#fafbfc;flex:1;}
        .stat-card h4{margin-bottom:10px;color:#333;font-size:16px;}
        .stat-row{display:flex;justify-content:space-between;margin:6px 0;font-size:14px;}
        .summary-box{margin-top:25px;padding-top:20px;border-top:1px dashed #ddd;}

        .container{
            display:grid;
            grid-template-columns: 32% 66%;
            gap:2%;
            width:100%;
            margin-top:20px;
        }
        .left-panel, .right-panel{
            display:flex;
            flex-direction:column;
            gap:20px;
        }
        .block-normal{
            height:280px;
            background:#fff;
            border-radius:10px;
            padding:16px;
            box-shadow:0 2px 8px #00000010;
            display:flex;
            flex-direction:column;
        }
        .block-large{
            height:500px;
            background:#fff;
            border-radius:10px;
            padding:16px;
            box-shadow:0 2px 8px #00000010;
            display:flex;
            flex-direction:column;
        }

        .section-title{color:#2b7cc7;margin-bottom:12px;font-weight:bold;font-size:16px;}
        .content-box{
            flex:1;
            border:1px solid #eee;
            border-radius:6px;
            padding:10px;
            overflow:auto;
            background:#fafbfc;
        }

        /* 优化输入框布局与尺寸 */
        .input-row { display:flex; gap:10px; margin-top:12px; align-items: stretch; }
        .input-row input[type="text"] { flex: 2; padding:10px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; }
        .input-row input[type="date"], .input-row select { flex: 1.2; padding:10px 8px; border:1px solid #ddd; border-radius:6px; font-size:14px; }
        .add-btn { padding:0 20px; background:#2b7cc7; color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:bold; cursor:pointer; white-space:nowrap; }

        .task-item{padding:8px 10px;background:#fff;margin-bottom:10px;border-radius:6px;border-left:4px solid #2b7cc7;font-size:14px; box-shadow:0 1px 3px #0000000a;}
        .task-item.overdue{border-left-color:#f56c6c;background:#fef0f0;}
        .task-main{display:flex;justify-content:space-between;align-items:center;gap:10px;}
        .task-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
        .task-op{display:flex;gap:8px;flex-shrink:0;}
        .edit-btn,.del-btn{cursor:pointer;padding:4px 8px;border-radius:4px;font-size:12px; font-weight:bold;}
        .edit-btn{color:#2b7cc7;border:1px solid #2b7cc7;background:#fff;}
        .del-btn{color:#e53e3e;border:1px solid #e53e3e;background:#fff;}

        table{width:100%;border-collapse:collapse;background:#fff;table-layout:fixed;min-width:600px;}
        th,td{
            padding:12px 10px;
            text-align:left;
            border-bottom:1px solid #eee;
            font-size:14px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        th{background:#f7fafc;font-weight:bold;}
        td.overdue{color:#f56c6c;font-weight:bold;}
        
        td select, td input { padding:6px; border:1px solid #ddd; border-radius:4px; font-size:13px; width: 100%; }
        .locked:disabled{background:#f1f1f1;cursor:not-allowed;}

        .modal{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;z-index:999;
        }
        .modal-content{
            background:#fff !important;
            padding:30px;border-radius:12px;width:480px;max-width:90%;position:relative;z-index:1000;
            color:#333 !important; box-shadow:0 10px 30px #00000044;
        }
        .close-modal{position:absolute;top:15px;right:15px;font-size:24px;cursor:pointer;color:#999;background:none;border:none;}
        .close-modal:hover{color:#333;}
        .hide{display:none!important;}
        
        .edit-row-btn{color:#2b7cc7; cursor:pointer; margin-right:12px; font-weight:bold;}
        .delete-row-btn{color:#e53e3e; cursor:pointer; font-weight:bold;}

        /* ================= 移动端终极自适应优化 ================= */
        @media screen and (max-width: 850px) {
            body { padding: 12px; }
            .top-bar { flex-direction: column; align-items: stretch; padding: 15px; }
            .btn-group { width: 100%; justify-content: flex-start; }
            .btn-group button { flex: 1 1 calc(33% - 10px); padding: 12px 0; font-size: 13px; text-align: center; }
            
            .container { display: flex; flex-direction: column; }
            .block-normal, .block-large { height: auto; min-height: 350px; max-height: 550px; }
            
            /* 强制输入框在移动端为 16px 防止 iOS 自动缩放 */
            .input-row { flex-direction: column; }
            .input-row input[type="text"], .input-row input[type="date"], .input-row select, .add-btn { 
                width: 100%; flex: none; font-size: 16px; padding: 12px; margin-bottom: 5px; 
            }
            .form-item input, .form-item select, .form-item textarea { font-size: 16px; padding: 12px; }
            
            .stat-card { min-width: 100%; flex: none; }
            .filter-wrap { flex-direction: column; align-items: stretch; }
            .filter-wrap select { width: 100%; font-size: 16px; }

            /* 表格横向滚动容器 */
            .table-responsive-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border:1px solid #eee; border-radius:6px; }
            .content-box { padding: 0; border: none; }
            .content-box table { border: none; }
            
            #currentUserInfo { margin-bottom: 5px; font-weight: bold; }
        }
    </style>
</head>
<body>

<div class="easy-tooltip"></div>

<div id="mainPage">
    <div class="top-bar">
        <h2>团队任务管理系统</h2>
        <div class="btn-group">
            <span id="currentUserInfo" style="color:#666;font-size:14px;margin-right:10px;"></span>
            <button class="login-trigger-btn" id="loginTriggerBtn" onclick="openLoginModal()">登录系统</button>
            <button class="add-user-btn hide" id="addUserBtn">添加用户</button>
            <button class="edit-pwd-btn hide" id="editPwdBtn">修改密码</button>
            <button class="reset-pwd-btn hide" id="resetPwdBtn">重置密码</button>
            <button class="export-btn hide" id="exportBtn" onclick="exportExcel()">导出Excel</button>
            <button class="logout-btn hide" id="logoutBtn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="user-manager hide" id="userManagerPanel">
        <h3>👥 用户管理</h3>
        <div class="table-responsive-wrapper">
            <table class="user-table">
                <thead><tr><th>ID</th><th>姓名</th><th>角色</th><th>小组</th><th>操作</th></tr></thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="dashboard">
        <h3>📊 任务完成统计</h3>
        <div id="statContainer"></div>
        
        <div class="summary-box">
            <h4>📋 全团队一级任务汇总</h4>
            <div class="table-responsive-wrapper" style="margin-top:12px;max-height:350px;overflow-y:auto;">
                <table>
                    <thead><tr><th>所属人</th><th>时间</th><th>任务内容</th><th>状态</th><th>备注</th></tr></thead>
                    <tbody id="level1Summary"></tbody>
                </table>
            </div>
        </div>

        <div class="summary-box" style="margin-top: 25px;">
            <h4>📋 全团队二级任务汇总</h4>
            <div class="table-responsive-wrapper" style="margin-top:12px;max-height:350px;overflow-y:auto;">
                <table>
                    <thead><tr><th>所属人</th><th>归属一级任务</th><th>时间</th><th>任务内容</th><th>状态</th><th>备注</th></tr></thead>
                    <tbody id="level2Summary"></tbody>
                </table>
            </div>
        </div>

        <div class="filter-wrap hide" id="filterWrap">
            <div style="flex:1;"><label>查看成员：</label><select id="viewUserSelect" onchange="switchView()"></select></div>
            <div style="flex:1;"><label>任务状态筛选：</label>
                <select id="statusFilter" onchange="filterTask()">
                    <option value="all">全部状态</option>
                    <option value="进行中">进行中</option>
                    <option value="已完成">已完成</option>
                    <option value="延期">延期</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container hide" id="taskContainer">
        <div class="left-panel">
            <div class="block-normal">
                <div class="section-title">一级时间节点</div>
                <div class="content-box" id="list1"></div>
                <div class="input-row hide" id="input1">
                    <input type="date" id="date1">
                    <input type="text" placeholder="任务内容" id="task1">
                    <button class="add-btn" onclick="addTask(1)">添加</button>
                </div>
            </div>
            <div class="block-normal">
                <div class="section-title">二级时间节点</div>
                <div class="content-box" id="list2"></div>
                <div class="input-row hide" id="input2">
                    <input type="date" id="date2">
                    <select id="parent2"></select>
                    <input type="text" placeholder="任务内容" id="task2">
                    <button class="add-btn" onclick="addTask(2)">添加</button>
                </div>
            </div>
            <div class="block-large">
                <div class="section-title">周任务</div>
                <div class="content-box" id="list3"></div>
                <div class="input-row hide" id="input3">
                    <input type="date" id="date3">
                    <select id="parent3"></select>
                    <input type="text" placeholder="任务内容" id="task3">
                    <button class="add-btn" onclick="addTask(3)">添加</button>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="block-normal">
                <div class="section-title">一级时间节点表</div>
                <div class="content-box table-responsive-wrapper">
                    <table>
                        <thead><tr><th>时间</th><th>内容</th><th>状态</th><th>备注</th><th>操作</th></tr></thead>
                        <tbody id="table1"></tbody>
                    </table>
                </div>
            </div>
            <div class="block-normal">
                <div class="section-title">二级时间节点表</div>
                <div class="content-box table-responsive-wrapper">
                    <table>
                        <thead><tr><th>归属一级</th><th>时间</th><th>内容</th><th>状态</th><th>备注</th><th>操作</th></tr></thead>
                        <tbody id="table2"></tbody>
                    </table>
                </div>
            </div>
            <div class="block-large">
                <div class="section-title">周任务表</div>
                <div class="content-box table-responsive-wrapper">
                    <table>
                        <thead><tr><th>归属一级</th><th>时间</th><th>内容</th><th>状态</th><th>备注</th><th>操作</th></tr></thead>
                        <tbody id="table3"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('loginModal')">×</button>
        <h2 style="text-align:center;color:#2b7cc7;margin-bottom:20px;">用户登录</h2>
        <div class="form-item">
            <label>选择用户</label>
            <select id="userSelect"></select>
        </div>
        <div class="form-item">
            <label>登录密码</label>
            <input type="password" id="loginPwd" placeholder="初始密码：8888">
        </div>
        <button class="login-btn" onclick="userLogin()">登录系统</button>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('editModal')">×</button>
        <h3 style="margin-bottom:15px;color:#2b7cc7;">编辑任务</h3>
        <div class="form-item">
            <label>任务时间</label>
            <input type="date" id="editDate">
        </div>
        <div class="form-item" id="editParentBox" style="display:none;">
            <label>归属一级任务</label>
            <select id="editParent"></select>
        </div>
        <div class="form-item">
            <label>任务内容</label>
            <input type="text" id="editContent">
        </div>
        <div class="form-item">
            <label>修改原因（仅修改时间必填）</label>
            <textarea id="editReason" rows="3"></textarea>
        </div>
        <button class="login-btn" onclick="saveEdit()">保存修改</button>
    </div>
</div>

<div class="modal" id="addUserModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('addUserModal')">×</button>
        <h3 style="margin-bottom:15px;color:#2b7cc7;">添加用户</h3>
        <div class="form-item">
            <label>姓名</label>
            <input type="text" id="newUserName">
        </div>
        <div class="form-item">
            <label>角色</label>
            <select id="newUserRole"></select>
        </div>
        <div class="form-item">
            <label>小组</label>
            <div id="newUserGroupContainer">
                <input type="text" id="newUserGroup">
            </div>
        </div>
        <button class="login-btn" onclick="saveNewUser()">保存并添加</button>
    </div>
</div>

<div class="modal" id="editUserModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('editUserModal')">×</button>
        <h3 style="margin-bottom:15px;color:#2b7cc7;">编辑用户</h3>
        <input type="hidden" id="editUserId">
        <div class="form-item">
            <label>姓名</label>
            <input type="text" id="editUserName">
        </div>
        <div class="form-item">
            <label>角色</label>
            <select id="editUserRole"></select>
        </div>
        <div class="form-item">
            <label>小组</label>
            <div id="editUserGroupContainer">
                <input type="text" id="editUserGroup">
            </div>
        </div>
        <button class="login-btn" onclick="saveEditUser()">保存修改</button>
    </div>
</div>

<div class="modal" id="editPwdModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('editPwdModal')">×</button>
        <h3 style="margin-bottom:15px;color:#2b7cc7;">修改密码</h3>
        <div class="form-item">
            <label>原密码</label>
            <input type="password" id="oldPwd">
        </div>
        <div class="form-item">
            <label>新密码</label>
            <input type="password" id="newPwd">
        </div>
        <div class="form-item">
            <label>确认新密码</label>
            <input type="password" id="confirmPwd">
        </div>
        <button class="login-btn" onclick="saveMyPwd()">确认修改</button>
    </div>
</div>

<div class="modal" id="resetPwdModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('resetPwdModal')">×</button>
        <h3 style="margin-bottom:15px;color:#e53e3e;">重置密码</h3>
        <div class="form-item">
            <label>选择需要重置的用户</label>
            <select id="resetUserSelect"></select>
        </div>
        <div class="form-item">
            <label>新密码</label>
            <input type="password" id="resetNewPwd" value="8888">
        </div>
        <button class="login-btn" style="background:#e53e3e;" onclick="doResetPwd()">强制重置</button>
    </div>
</div>

<script>
const API = "/api";
let userList = [];
let currentUser = null;
let viewUid = null;
let editTask = null;
let globalTaskData = {};

const roleLevel = { cto:4, hw_manager:3, sw_manager:3, mech_manager:3, manager:3, leader:2, member:1 };
const roleText = { cto:"CTO", hw_manager:"硬件经理", sw_manager:"软件经理", mech_manager:"结构经理", manager:"经理", leader:"组长", member:"组员" };

/* 自动获取本周五的日期（ISO星期标准） */
function getThisFriday() {
    const d = new Date();
    const currentDay = d.getDay() === 0 ? 7 : d.getDay(); // 将周日映射为 7，周一为 1
    const daysToFriday = 5 - currentDay; // 差值计算，周一+4，周六-1
    d.setDate(d.getDate() + daysToFriday);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
}

function closeModal(m){
    document.getElementById(m).style.display="none";
    $("#editReason").val("");
}
function closeAllModals(){document.querySelectorAll(".modal").forEach(m=>m.style.display="none");}

async function get(url){
    try{
        const r=await fetch(API+url);
        return await r.json();
    }catch(e){
        return {l1:[],l2:[],week:[]};
    }
}
async function post(url,d){
    try{
        return await fetch(API+url,{
            method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(d)
        }).then(res=>res.json());
    }catch(e){
        return {ok:false};
    }
}

function isManager(){return ["hw_manager", "sw_manager", "mech_manager", "manager"].includes(currentUser?.role);}
function isLeader(){return currentUser?.role === "leader";}
function canEditAnyTask(){
    if(!currentUser) return false;
    return currentUser.role === "cto" || isManager() || currentUser.role === "leader";
}
function canManageUser(){return currentUser && currentUser.role !== "member";}

function canViewUser(target){
    if(!currentUser) return false;
    if(currentUser.role === "cto") return target.id !== 1;
    if(currentUser.role === "hw_manager") return (target.role === "leader" || target.role === "member") && (target.group && target.group.includes("硬件"));
    if(currentUser.role === "sw_manager") return (target.role === "leader" || target.role === "member") && (target.group && target.group.includes("软件"));
    if(currentUser.role === "mech_manager") return (target.role === "leader" || target.role === "member") && (target.group && target.group.includes("结构"));
    if(currentUser.role === "leader") return target.role === "member" && target.group === currentUser.group;
    return false;
}
function canEditOrDeleteUser(target){
    if(!currentUser || target.id === 1) return false;
    return roleLevel[target.role] < roleLevel[currentUser.role];
}

function getDirectSuperior(uid){
    const user = userList.find(u => u.id == uid);
    if(!user) return [];
    const res = [];
    let mgrRole = "";
    if(user.group && user.group.includes("硬件")) mgrRole = "hw_manager";
    else if(user.group && user.group.includes("软件")) mgrRole = "sw_manager";
    else if(user.group && user.group.includes("结构")) mgrRole = "mech_manager";

    if(user.role === "member"){
        const leader = userList.find(u => u.role === "leader" && u.group === user.group);
        if(leader) res.push(leader.id);
        if(mgrRole){
            const manager = userList.find(u => u.role === mgrRole);
            if(manager) res.push(manager.id);
        }
    }
    if(user.role === "leader"){
        if(mgrRole){
            const manager = userList.find(u => u.role === mgrRole);
            if(manager) res.push(manager.id);
        }
    }
    return res;
}

function getAddSyncUserIds(operatorUid, taskType) {
    const user = userList.find(u => u.id == operatorUid);
    const syncIds = new Set();
    syncIds.add(operatorUid);
    if(!user) return Array.from(syncIds);

    const superiorIds = getDirectSuperior(operatorUid);
    if(user.role === "member" && taskType === 1){
        superiorIds.forEach(id => syncIds.add(id));
    }
    if(user.role === "member" && taskType === 2){
        const leader = userList.find(u => u.role === "leader" && u.group === user.group);
        if(leader) syncIds.add(leader.id);
    }
    if(user.role === "leader" && taskType === 1){
        let mgrRole = "";
        if(user.group && user.group.includes("硬件")) mgrRole = "hw_manager";
        else if(user.group && user.group.includes("软件")) mgrRole = "sw_manager";
        else if(user.group && user.group.includes("结构")) mgrRole = "mech_manager";
        if(mgrRole){
            const manager = userList.find(u => u.role === mgrRole);
            if(manager) syncIds.add(manager.id);
        }
    }
    return Array.from(syncIds);
}

function compareUserByRoleAndName(a, b) {
    const lvlA = roleLevel[a.role] || 0;
    const lvlB = roleLevel[b.role] || 0;
    if (lvlB !== lvlA) return lvlB - lvlA; 
    return a.name.localeCompare(b.name, 'zh'); 
}

function isOverdue(dateStr, status){
    if(status === "已完成") return false;
    const today = new Date();
    const taskDate = new Date(dateStr);
    return taskDate < today;
}
function sortByDate(arr){
    return arr.sort((a,b)=> new Date(a.date) - new Date(b.date));
}

function getAllTeamLevel1Tasks() {
    const allL1 = [];
    const seen = new Set();
    for (const uid in globalTaskData) {
        const d = globalTaskData[uid];
        if (d && d.l1) {
            d.l1.forEach(item => {
                if (item && item.content) {
                    const contentTrimmed = item.content.trim();
                    if (!seen.has(contentTrimmed)) {
                        seen.add(contentTrimmed);
                        allL1.push(item);
                    }
                }
            });
        }
    }
    return sortByDate(allL1);
}

async function refreshTask(){
    if(!viewUid) return;
    const tu = userList.find(u=>u.id==viewUid);
    if(currentUser && currentUser.role!=="cto" && tu?.role==="cto"){ render(1,[]);render(2,[]);render(3,[]); return;}
    const d = await get(`/task/${viewUid}`);
    globalTaskData[viewUid] = d;

    if(d.l1) d.l1.forEach((x, idx) => x._origIdx = idx);
    if(d.l2) d.l2.forEach((x, idx) => x._origIdx = idx);
    if(d.week) d.week.forEach((x, idx) => x._origIdx = idx);

    const f = document.getElementById("statusFilter").value;
    let l1 = sortByDate([...d.l1||[]]);
    let l2 = sortByDate([...d.l2||[]]);
    let l3 = sortByDate([...d.week||[]]);
    if(f!=="all"){
        l1 = l1.filter(x=>x.status===f);
        l2 = l2.filter(x=>x.status===f);
        l3 = l3.filter(x=>x.status===f);
    }
    
    const allTeamL1 = getAllTeamLevel1Tasks();
    fillParentSelect("parent2", allTeamL1);
    fillParentSelect("parent3", allTeamL1);
    
    render(1,l1); render(2,l2); render(3,l3);
}

    list.forEach((item,i)=>{

        const ft = prefix + item.date + " " + item.content;
        const div = document.createElement("div");
        div.className = "task-item";

        if(item.history?.length){
            html+='<div style="margin-top:4px;font-size:12px;color:#666;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto;">';
            item.history.forEach((h,j)=>html+=`[记录${j+1}] ${h}<br>`);
            html+='</div>';
        }
        div.innerHTML=`<div class="task-main"><div class="task-text" data-show="${ft}">${ft}</div><div class="task-op">
            ${canEdit?`<span class="edit-btn" onclick="openEdit(${t},${item._origIdx})">编辑</span>`:""}
            ${canEdit?`<span class="del-btn" onclick="delTask(${t},${item._origIdx})">删除</span>`:""}
        </div></div>${html}`;
        le.appendChild(div);
        
        const tr = document.createElement("tr");

        let pcell = "";
        if(t===2||t===3) pcell=`<td data-show="${item.parent||''}">${item.parent||''}</td>`;
        tr.innerHTML = `
            ${pcell}
            <td data-show="${item.date}" class="${dc}">${item.date}</td>
            <td data-show="${item.content}">${item.content}</td>
            <td data-show="${item.status}">
                <select ${!canEdit?"disabled":""} onchange="setStatus(${t},${item._origIdx},this.value)">
                    <option ${item.status==="进行中"?"selected":""}>进行中</option>

    });

async function saveEdit(){
    if(!editTask) return;
    const {t,i,oldDate} = editTask;
    const nd = document.getElementById("editDate").value.trim();
    const nc = document.getElementById("editContent").value.trim();
    const r = document.getElementById("editReason").value.trim();
    const p = (t===2||t===3) ? document.getElementById("editParent").value : "";
    if(!nd||!nc){alert("时间和内容不能为空");return;}
    if(t===2 && !p){alert("二级任务必须选择归属一级任务");return;}
    if(oldDate!==nd && !r){alert("修改时间必须填写原因！");return;}
    const d = await get(`/task/${viewUid}`);
    const k = t===1?"l1":t===2?"l2":"week";
    const tar = d[k][i];
    tar.date=nd; tar.content=nc;
    if(t===2||t===3) tar.parent=p;
    if(oldDate!==nd){
        const log = `由${oldDate}改到${nd},修改原因:${r}`;
        if(!tar.history) tar.history=[];
        tar.history.push(log);
    }
    await post("/task/save",{uid:viewUid,data:d});
    closeModal("editModal"); await refreshStat(); await refreshTask();
}

async function addTask(t){
    const date = document.getElementById("date"+t).value;
    const content = document.getElementById("task"+t).value.trim();
    const parent = (t===2||t===3) ? document.getElementById("parent"+t).value : "";
    if(!date||!content){alert("请填写完整");return;}
    if(t===2 && !parent){alert("请选择归属一级任务");return;}
    
    const taskId = Date.now() + "_" + Math.random().toString(36).substring(2, 9);
    const item = {id: taskId, date, content, status:"进行中", remark:"", history:[], parent};
    const syncUserIds = getAddSyncUserIds(viewUid, t);
    for(const uid of syncUserIds){
        const d = await get(`/task/${uid}`);
        const k = t===1?"l1":t===2?"l2":"week";
        if(!d[k]) d[k] = [];
        d[k].push(JSON.parse(JSON.stringify(item)));
        await post("/task/save",{uid,data:d});
    }
    
    /* 每次添加完毕后重置输入框，若为周任务则重置回默认周五 */
    if (t === 3) {
        document.getElementById("date3").value = getThisFriday();
        document.getElementById("task3").value = "";
    } else {
        document.getElementById("date"+t).value = "";
        document.getElementById("task"+t).value = "";
    }
    
    await refreshStat(); await refreshTask();
}

async function delTask(t, index){
    if(!confirm("确定删除？")) return;
    const key = t === 1 ? "l1" : t === 2 ? "l2" : "week";
    const currUid = viewUid;
    let currData = await get(`/task/${currUid}`);
    if(!currData[key] || !currData[key][index]) return;
    const targetTask = currData[key][index];
    const targetId = targetTask.id;
    const targetContent = targetTask.content;
    const targetDate = targetTask.date;

    for(const user of userList){
        let userData = await get(`/task/${user.id}`);
        if(!userData[key] || userData[key].length === 0) continue;
        let isChanged = false;
        for(let i = userData[key].length - 1; i >= 0; i--){
            const currentTask = userData[key][i];
            if(targetId) {
                if(currentTask.id === targetId) { userData[key].splice(i, 1); isChanged = true; }
            } else {
                if(currentTask.content === targetContent && currentTask.date === targetDate) { userData[key].splice(i, 1); isChanged = true; }
            }
        }
        if(isChanged){ await post("/task/save", { uid: user.id, data: userData }); }
    }
    await refreshStat(); await refreshTask();
}

/* ================= 升级核心：全新的部门组别映射与排序 ================= */
function getGroupType(groupName) {
    if (groupName.includes("硬件")) return 1;
    if (groupName.includes("软件")) return 2;
    if (groupName.includes("结构")) return 3;
    if (groupName.includes("电气")) return 4;
    if (groupName.includes("DVT")) return 5;
    if (groupName.includes("试制")) return 6;
    if (groupName.includes("下线")) return 7;
    return 99; // 未知匹配则放最后
}

function extractGroupNumber(groupName) {
    const match = groupName.match(/[一二三四五六七八九十\d]+/);
    if (!match) return 999;
    const numStr = match[0];
    const numberMap = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10 };
    return numberMap[numStr] ?? parseInt(numStr, 10) ?? 999;
}

async function refreshStat(){
    const map = {};
    const reqs = userList.map(async (u) => {
        if(!currentUser || u.role !== "cto" || currentUser.role === "cto"){
            map[u.id] = await get(`/task/${u.id}`);
            globalTaskData[u.id] = map[u.id]; 
        }
    });
    await Promise.all(reqs);

    const box = document.getElementById("statContainer");
    box.innerHTML = "";

    const adminUsers = userList.filter(u=>["cto","hw_manager","sw_manager","mech_manager","manager"].includes(u.role));
    if(adminUsers.length){
        adminUsers.sort(compareUserByRoleAndName); 

        const tit = document.createElement("div");
        tit.className="group-title"; tit.innerText="管理层（CTO/各模块经理）";
        box.appendChild(tit);
        const r = document.createElement("div"); r.className="group-row";
        adminUsers.forEach(u=>{
            if(currentUser && currentUser.role!=="cto" && u.role==="cto") return;
            if(currentUser && isManager() && currentUser.role !== u.role) return;
            r.appendChild(createStatCard(u,map[u.id]));
        });
        box.appendChild(r);
    }

    const groupMap = {};
    userList.forEach(u=>{
        if(["cto","hw_manager","sw_manager","mech_manager","manager"].includes(u.role))return;
        if(!groupMap[u.group])groupMap[u.group]=[];
        groupMap[u.group].push(u);
    });
    
    /* 采用全新的组别主排序 + 数字编号副排序 */
    const sortedGroups = Object.keys(groupMap).sort((a, b) => {
        const ta = getGroupType(a); const tb = getGroupType(b);
        if (ta !== tb) return ta - tb;
        const na = extractGroupNumber(a); const nb = extractGroupNumber(b);
        return na - nb;
    });
    
    sortedGroups.forEach(g=>{
        if(currentUser && currentUser.role === "hw_manager" && !g.includes("硬件")) return;
        if(currentUser && currentUser.role === "sw_manager" && !g.includes("软件")) return;
        if(currentUser && currentUser.role === "mech_manager" && !g.includes("结构")) return;
        
        const t = document.createElement("div");
        t.className="group-title"; t.innerText=`小组：${g}`;
        box.appendChild(t);
        const r = document.createElement("div"); r.className="group-row";
        
        groupMap[g].sort(compareUserByRoleAndName);
        groupMap[g].forEach(u=>r.appendChild(createStatCard(u,map[u.id])));
        box.appendChild(r);
    });

    // ================= 一级任务汇总 =================
    const sumBody = document.getElementById("level1Summary");
    sumBody.innerHTML = "";
    const items = [];
    userList.forEach(u=>{
        if(currentUser && currentUser.role!=="cto" && u.role==="cto")return;
        if(currentUser && currentUser.role === "hw_manager" && !(u.group && u.group.includes("硬件"))) return;
        if(currentUser && currentUser.role === "sw_manager" && !(u.group && u.group.includes("软件"))) return;
        if(currentUser && currentUser.role === "mech_manager" && !(u.group && u.group.includes("结构"))) return;

        const td = map[u.id];
        if(!td||!td.l1)return;
        td.l1.forEach(it=>{
            items.push({user:u,date:it.date,content:it.content,status:it.status,remark:it.remark||""});
        });
    });
    const final = {};
    items.forEach(it=>{
        const key = it.content.trim();
        const curr = roleLevel[it.user.role] || 0;
        if(!final[key] || curr < (roleLevel[final[key].user.role] || 0)){ final[key] = it; }
    });

    const sortedL1Items = Object.values(final).sort((a, b) => new Date(a.date) - new Date(b.date));

    sortedL1Items.forEach(it=>{
        const tr = document.createElement("tr");
        const dc = isOverdue(it.date,it.status)?"overdue":"";
        tr.innerHTML = `
            <td data-show="${it.user.name}">${it.user.name}</td>
            <td data-show="${it.date}" class="${dc}">${it.date}</td>
            <td data-show="${it.content}">${it.content}</td>
            <td data-show="${it.status}">${it.status}</td>
            <td data-show="${it.remark}">${it.remark}</td>`;
        sumBody.appendChild(tr);
    });

    // ================= 全团队二级任务汇总 =================
    const sumBodyL2 = document.getElementById("level2Summary");
    if (sumBodyL2) {
        sumBodyL2.innerHTML = "";
        const itemsL2 = [];
        
        const l1DateMap = {};
        sortedL1Items.forEach(it => {
            l1DateMap[it.content.trim()] = it.date;
        });

        userList.forEach(u=>{
            if(currentUser && currentUser.role!=="cto" && u.role==="cto")return;
            if(currentUser && currentUser.role === "hw_manager" && !(u.group && u.group.includes("硬件"))) return;
            if(currentUser && currentUser.role === "sw_manager" && !(u.group && u.group.includes("软件"))) return;
            if(currentUser && currentUser.role === "mech_manager" && !(u.group && u.group.includes("结构"))) return;

            const td = map[u.id];
            if(!td||!td.l2)return;
            td.l2.forEach(it=>{
                itemsL2.push({user:u,date:it.date,content:it.content,status:it.status,remark:it.remark||"",parent:it.parent||""});
            });
        });

        const finalL2 = {};
        itemsL2.forEach(it=>{
            const key = (it.parent + "|||" + it.content).trim();
            const curr = roleLevel[it.user.role] || 0;
            if(!finalL2[key] || curr < (roleLevel[finalL2[key].user.role] || 0)){ finalL2[key] = it; }
        });

        const l2List = Object.values(finalL2);

        l2List.forEach(it => {
            const pTrim = it.parent ? it.parent.trim() : "";
            it.parentDate = l1DateMap[pTrim] || "1970-01-01"; 
        });

        l2List.sort((a, b) => {
            const dateA = new Date(a.parentDate);
            const dateB = new Date(b.parentDate);
            if (dateA - dateB !== 0) return dateA - dateB; 
            
            const pA = a.parent || "";
            const pB = b.parent || "";
            if (pA !== pB) return pA.localeCompare(pB, 'zh'); 
            
            return new Date(a.date) - new Date(b.date); 
        });

        l2List.forEach(it=>{
            const tr = document.createElement("tr");
            const dc = isOverdue(it.date,it.status)?"overdue":"";
            tr.innerHTML = `
                <td data-show="${it.user.name}">${it.user.name}</td>
                <td data-show="${it.parent}">${it.parent}</td>
                <td data-show="${it.date}" class="${dc}">${it.date}</td>
                <td data-show="${it.content}">${it.content}</td>
                <td data-show="${it.status}">${it.status}</td>
                <td data-show="${it.remark}">${it.remark}</td>`;
            sumBodyL2.appendChild(tr);
        });
    }
}

function createStatCard(user,data){
    function p(list){
        if(!list||list.length===0)return "100%";
        const delayed = list.filter(x=>x.status==="延期").length;
        return Math.round((1 - delayed/list.length)*100)+"%";
    }
    const d=document.createElement("div");d.className="stat-card";
    const rName = roleText[user.role] || user.role;
    const taskData = data || {l1:[], l2:[], week:[]};
    d.innerHTML=`<h4>${user.name}（${rName}）</h4>
    <div class="stat-row">一级任务：${p(taskData.l1)}</div>
    <div class="stat-row">二级任务：${p(taskData.l2)}</div>
    <div class="stat-row">周任务：${p(taskData.week)}</div>`;
    return d;
}

function exportExcel(){
    const wb=XLSX.utils.book_new();
    const arr=[["所属人","角色","小组","任务类型","归属一级","时间","内容","状态","备注"]];
    for(const uid in globalTaskData){
        const u=userList.find(x=>x.id==uid);if(!u)continue;
        const d=globalTaskData[uid];
        const ts=[
            {n:"一级时间节点",list:d.l1||[]},
            {n:"二级时间节点",list:d.l2||[]},
            {n:"周任务",list:d.week||[]}
        ];
        ts.forEach(t=>{
            t.list.forEach(it=>{
                arr.push([u.name,roleText[u.role] || u.role,u.group,t.n,it.parent||"",it.date,it.content,it.status,it.remark||""]);
            });
        });
    }
    const ws=XLSX.utils.aoa_to_sheet(arr);
    XLSX.utils.book_append_sheet(wb,ws,"任务数据");
    XLSX.writeFile(wb,"团队任务数据.xlsx");
}

function openEditUser(id){
    const u=userList.find(x=>x.id==id);if(!u)return;
    document.getElementById("editUserId").value=u.id;
    document.getElementById("editUserName").value=u.name;
    
    const container = document.getElementById("editUserGroupContainer");
    if(currentUser && currentUser.role === "leader"){
        const groups = currentUser.group ? currentUser.group.split(/[,，、/|;；\s]+/).filter(Boolean) : ["默认组"];
        if(groups.length > 1){
            let selHtml = '<select id="editUserGroup">';
            groups.forEach(g => { selHtml += `<option value="${g}" ${g===u.group?"selected":""}>${g}</option>`; });
            selHtml += '</select>';
            container.innerHTML = selHtml;
        }else{
            container.innerHTML = `<input type="text" id="editUserGroup" value="${groups[0]}" readonly class="locked" disabled>`;
        }
    }else{
        container.innerHTML = `<input type="text" id="editUserGroup" value="${u.group}">`;
    }

    const s=document.getElementById("editUserRole");s.innerHTML="";
    const allow=[];
    if(currentUser.role==="cto")allow.push("hw_manager","sw_manager","mech_manager","manager","leader","member");
    if(isManager())allow.push("leader","member");
    if(currentUser.role==="leader")allow.push("member");
    allow.forEach(r=>{s.innerHTML+=`<option value="${r}" ${r===u.role?"selected":""}>${roleText[r]}</option>`;});
    document.getElementById("editUserModal").style.display="flex";
}
