<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>团队任务管理系统 V3.8 修正版</title>
    <!-- 保持原有所有 CSS 和依赖，此处省略以节省篇幅，直接复制下方逻辑代码即可 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- [此处请保留原有的完整 HTML 结构和 CSS，仅替换下面的 <script> 块] -->
    <style>
        /* (保持原有的 CSS 不变) */
        :root { --status-ongoing: #e2f0d9; --status-ontime: #cddef6; --status-overdue-no: #fff2cc; --status-overdue-ok: #fce4d6; --status-none: #f2f2f2; }
        body { background:#f5f7fa; padding:10px; font-family: "Microsoft YaHei"; }
        .hide { display: none !important; }
        .window-box { background: white; padding: 12px; height: 720px; overflow: hidden; display: flex; flex-direction: column; }
        .task-tree-panel { flex: 1; overflow-y: auto; }
        .node-main { padding: 5px; border: 1px solid #ccc; margin: 5px; cursor: pointer; }
        .active-focus { outline: 2px solid #1890ff; }
    </style>
</head>
<body>
    <!-- (保持原有的 DOM 结构不变，仅替换 <script> 内部逻辑) -->
    <div id="taskContainer" class="workspace">
        <div class="window-box">
             <div class="task-tree-panel" id="taskTreeBox"></div>
        </div>
    </div>

<script>
// ... (保持原有的 API, roleLevel, roleText 等变量定义)
const API = "/api";
let userList = [];
let currentUser = null;
let viewUid = null; 
let globalTaskData = {}; 
let allTasksArr = []; 
let displayTasks = []; 

/* ================= 核心修正区 ================= */

// 1. 核心修复：任务数据源由“全局全量”动态计算，不再依赖碎片数据源
function refreshDisplayTasks() {
    if(!currentUser || !viewUid) return;
    
    // 强制基于 allTasksArr (唯一数据源) 进行权限过滤
    // 逻辑：如果管理员可见全部；如果成员，只能看到与自己有关的（Owner是自己，或者自己创建的，或者上级指派的）
    window.displayTasks = allTasksArr.filter(t => {
        // 权限判断逻辑
        const isOwner = (t.owner || '').trim() === (userList.find(u=>u.id==viewUid)||{}).name;
        const isCreator = t.creatorId == viewUid;
        // 如果是管理员或者CTO，可见全部
        if (currentUser.role === 'cto' || currentUser.role === 'manager') return true;
        // 成员可见自己相关任务
        return isOwner || isCreator;
    });

    // 重新渲染树
    renderTaskTree();
}

// 2. 修复删除功能：确保删除后强制重新加载并渲染
async function executeDelete(id) {
    let idsToDelete = [id];
    function collect(pid) { allTasksArr.filter(t=>t.pid===pid).forEach(c=>{ idsToDelete.push(c.id); collect(c.id); }); }
    collect(id);
    
    // 从数组中移除
    allTasksArr = allTasksArr.filter(t => !idsToDelete.includes(t.id));
    
    // 同步到后台
    await fullSyncToBackend();
    
    // 强制触发全量 UI 刷新
    refreshDisplayTasks();
    renderTaskTree();
    alert("任务已删除。");
}

// 3. 修复 +- 号折叠功能：确保更新后立即重绘
function toggleNodeCollapse(id, e) {
    if(e) e.stopPropagation();
    let node = allTasksArr.find(t => t.id === id);
    if (node) {
        node.isCollapsed = !node.isCollapsed;
        // 折叠状态需要同步，否则刷新会丢失
        fullSyncToBackend().then(() => {
            refreshDisplayTasks();
            renderTaskTree();
        });
    }
}

// 4. 优化权限校验函数 (确保组员不能修改上级内容)
function canEditContentAndDate(task) {
    if(!currentUser) return false;
    if(currentUser.role === 'cto') return true;
    // 组员权限控制：只能编辑自己创建的
    if(currentUser.role === 'member') {
        return task.creatorId == currentUser.id;
    }
    return isSuperiorOrSelf(currentUser.id, task.creatorId);
}

// ... (保留其余原有功能函数: fullSyncToBackend, adaptOldData, renderTaskTree, etc.)
// 注意：请确保 renderTaskTree 中使用了 displayTasks 数组而不是 globalTaskData
</script>
</body>
</html>
